name: VisionGuard Production Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: visionguard-prod
  cancel-in-progress: false

env:
  PROD_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
  SANDBOX_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/sandbox/
  PAGES_BASE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

jobs:
  # ─── 1. Sandbox: deploy + testes funcionais + auditoria ──────────────────
  sandbox:
    name: 🧪 Sandbox (testes + auditoria)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: 🔑 Verificar GEMINI_API_KEY
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "❌ GEMINI_API_KEY ausente."
            exit 1
          fi

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Instalar Dependências
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: 🚀 Deploy para /sandbox/
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          destination_dir: sandbox
          keep_files: true
          commit_message: "sandbox: ${{ github.sha }}"

      - name: ⏳ Aguardar sandbox responder HTTP 200
        run: |
          for i in {1..30}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.SANDBOX_URL }}")
            if [ "$CODE" = "200" ]; then
              echo "✅ Sandbox live"
              exit 0
            fi
            echo "⏳ ($i/30) HTTP=$CODE — aguardando..."
            sleep 10
          done
          echo "❌ Sandbox não respondeu HTTP 200 em 5min"
          exit 1

      - name: 🧪 Testes funcionais (Playwright)
        env:
          BASE_URL: ${{ env.SANDBOX_URL }}
        run: npx playwright test tests/functional.spec.js

      - name: 📸 Capturar evidências visuais (sandbox)
        env:
          BASE_URL: ${{ env.SANDBOX_URL }}
        run: npx playwright test tests/visual.spec.js

      - name: 📤 Publicar screenshots em gh-pages/evidence/sandbox/
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ORIG_DIR="$PWD"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          SUBFOLDER="evidence/sandbox/${SHA_SHORT}-run-${{ github.run_number }}"

          git config --global user.name "visionguard-bot"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "ℹ️ gh-pages não existe ainda"
            exit 0
          fi

          WORK=$(mktemp -d)
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$WORK"

          mkdir -p "$WORK/$SUBFOLDER"
          for f in screenshot-*.png; do
            [ -f "$f" ] && cp "$f" "$WORK/$SUBFOLDER/" || true
          done

          cd "$WORK"
          git add -A
          git diff --staged --quiet && { echo "ℹ️ Sem screenshots novos"; exit 0; }
          git commit -m "evidence: sandbox ${SHA_SHORT} run-${{ github.run_number }} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages
          cd "$ORIG_DIR"

          echo "SCREENSHOTS_BASE_URL=${{ env.PAGES_BASE }}/${SUBFOLDER}" >> "$GITHUB_ENV"

      - name: 🧠 Auditoria cognitiva (sandbox — sem STRICT)
        if: always()
        env:
          CI: 'true'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCREENSHOTS_BASE_URL: ${{ env.SCREENSHOTS_BASE_URL }}
        run: node ai_agents/visual_qa.js

      - name: 💾 Salvar evidências do sandbox
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-evidence-${{ github.sha }}
          path: |
            screenshot-*.png
            audit-output.md
          retention-days: 14

  # ─── 2. Snapshot da versão atual de produção ──────────────────────────────
  snapshot:
    name: 📦 Snapshot prod-stable
    needs: sandbox
    runs-on: ubuntu-latest
    outputs:
      had_previous: ${{ steps.snap.outputs.had_previous }}
    steps:
      - name: Checkout do gh-pages atual
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: pages-current
        continue-on-error: true

      - name: Promover gh-pages → prod-stable
        id: snap
        run: |
          if [ -d pages-current ] && [ -f pages-current/index.html ]; then
            cd pages-current
            git config user.name "visionguard-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git checkout -B prod-stable
            git push origin prod-stable --force
            echo "had_previous=true" >> $GITHUB_OUTPUT
            echo "✅ Snapshot salvo em prod-stable"
          else
            echo "had_previous=false" >> $GITHUB_OUTPUT
            echo "ℹ️ Nenhum gh-pages anterior — primeiro deploy"
          fi

  # ─── 3. Deploy em produção (gate: aprovação humana) ───────────────────────
  deploy:
    name: 🚀 Deploy em produção
    needs: snapshot
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Publicar public/ em gh-pages (preserva /sandbox/ e /evidence/)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          keep_files: true
          commit_message: "deploy: ${{ github.sha }}"

  # ─── 4. Smoke test em produção (HTTP + IA STRICT) ─────────────────────────
  smoke-test:
    name: 🔬 Smoke test em produção
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: ⏳ Aguardar prod responder HTTP 200
        run: |
          for i in {1..30}; do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" "${{ env.PROD_URL }}")
            if [ "$CODE" = "200" ]; then
              echo "✅ Prod live em ${{ env.PROD_URL }}"
              exit 0
            fi
            echo "⏳ ($i/30) HTTP=$CODE — aguardando..."
            sleep 10
          done
          echo "❌ Prod não respondeu HTTP 200 em 5min"
          exit 1

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: 📸 Capturar screenshot de produção
        env:
          BASE_URL: ${{ env.PROD_URL }}
        run: npx playwright test tests/visual.spec.js

      - name: 📤 Publicar screenshots de produção em gh-pages/evidence/prod/
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ORIG_DIR="$PWD"
          SHA_SHORT="${GITHUB_SHA:0:7}"
          SUBFOLDER="evidence/prod/${SHA_SHORT}-run-${{ github.run_number }}"

          git config --global user.name "visionguard-bot"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORK=$(mktemp -d)
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$WORK"

          mkdir -p "$WORK/$SUBFOLDER"
          for f in screenshot-*.png; do
            [ -f "$f" ] && cp "$f" "$WORK/$SUBFOLDER/" || true
          done

          cd "$WORK"
          git add -A
          git diff --staged --quiet && { echo "ℹ️ Sem screenshots novos"; exit 0; }
          git commit -m "evidence: prod smoke ${SHA_SHORT} run-${{ github.run_number }} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages
          cd "$ORIG_DIR"

          echo "SCREENSHOTS_BASE_URL=${{ env.PAGES_BASE }}/${SUBFOLDER}" >> "$GITHUB_ENV"

      - name: 🧠 Auditoria cognitiva em produção (STRICT)
        env:
          CI: 'true'
          STRICT_MODE: 'true'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          SCREENSHOTS_BASE_URL: ${{ env.SCREENSHOTS_BASE_URL }}
        run: node ai_agents/visual_qa.js

      - name: 📊 Atualizar badge e histórico
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ORIG_DIR="$PWD"
          BRANCH="visionguard-evidence"

          git config --global user.name "visionguard-bot"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORK=$(mktemp -d)
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git clone --depth 1 --branch "$BRANCH" \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$WORK"
          else
            git init "$WORK"
            cd "$WORK"
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git checkout --orphan "$BRANCH"
            echo "# VisionGuard — Evidências de Auditoria" > README.md
            git add README.md
            git commit -m "chore: init evidence branch"
            cd "$ORIG_DIR"
          fi

          [ -f badge.json ] && cp badge.json "$WORK/"

          HISTORY="$WORK/audit-history.md"
          if [ ! -f "$HISTORY" ]; then
            printf '# Histórico de Auditorias VisionGuard\n\n| Data | Commit | Ambiente | Veredito | Run |\n|---|---|---|---|---|\n' > "$HISTORY"
          fi
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          SHA_SHORT="${GITHUB_SHA:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          VEREDITO=$(grep -o '\[APROVADO\]\|\[REPROVADO\]' audit-output.md 2>/dev/null | head -1 || echo "N/A")
          printf '| %s | `%s` | produção | **%s** | [ver](%s) |\n' \
            "$DATE" "$SHA_SHORT" "$VEREDITO" "$RUN_URL" >> "$HISTORY"

          cd "$WORK"
          git add -A
          git diff --staged --quiet || git commit -m "evidence: badge + histórico prod ${SHA_SHORT}"
          git push origin "$BRANCH" --force
          cd "$ORIG_DIR"

      - name: 💾 Salvar evidências de produção
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: prod-smoke-evidence-${{ github.sha }}
          path: |
            screenshot-*.png
            audit-output.md
          retention-days: 14

  # ─── 5. Rollback automático em caso de falha ──────────────────────────────
  rollback:
    name: 🔙 Rollback automático
    needs: [snapshot, smoke-test]
    if: failure() && needs.smoke-test.result == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Baixar evidências do smoke test
        uses: actions/download-artifact@v4
        with:
          name: prod-smoke-evidence-${{ github.sha }}
          path: ./evidence
        continue-on-error: true

      - name: Checkout prod-stable
        if: needs.snapshot.outputs.had_previous == 'true'
        uses: actions/checkout@v4
        with:
          ref: prod-stable
          path: stable

      - name: Restaurar prod-stable → gh-pages
        if: needs.snapshot.outputs.had_previous == 'true'
        run: |
          cd stable
          git config user.name "visionguard-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B gh-pages
          git push origin gh-pages --force
          echo "✅ Rollback concluído — gh-pages restaurado para prod-stable"

      - name: Abrir issue de incidente
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let auditBody = '_(relatório indisponível — verifique os artefatos do run)_';
            try {
              auditBody = fs.readFileSync('./evidence/audit-output.md', 'utf8');
            } catch (e) { /* artifact ausente */ }

            const hadPrevious = '${{ needs.snapshot.outputs.had_previous }}' === 'true';
            const rollbackNote = hadPrevious
              ? '✅ **Rollback automático executado.** A versão estável anterior foi restaurada em produção.'
              : '⚠️ **Rollback não executado** — não havia versão estável anterior (primeiro deploy).';

            const sha = context.sha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const prodUrl = process.env.PROD_URL || 'N/A';

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Incidente em produção — rollback automático (${sha})`,
              body: [
                `## Falha detectada no smoke test pós-deploy`,
                ``,
                rollbackNote,
                ``,
                `| Campo | Valor |`,
                `|---|---|`,
                `| **Commit** | \`${context.sha}\` |`,
                `| **URL de prod** | ${prodUrl} |`,
                `| **Workflow run** | [Ver logs](${runUrl}) |`,
                ``,
                `### Relatório do VisionGuard`,
                ``,
                auditBody,
                ``,
                `---`,
                `_Próximos passos: investigar a causa, corrigir em branch, abrir PR. O VisionGuard reauditará na próxima PR._`,
              ].join('\n'),
              labels: ['rollback', 'production-incident', 'visionguard'],
            });
        env:
          PROD_URL: ${{ env.PROD_URL }}

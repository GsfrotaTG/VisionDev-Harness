name: VisionGuard Cognitive Harness

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  cognitive-qa:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Verificar GEMINI_API_KEY
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "❌ O secret GEMINI_API_KEY não está configurado."
            echo "Acesse: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          echo "✅ GEMINI_API_KEY presente."

      - name: 🔍 Extrair Git Diff
        run: git diff origin/${{ github.base_ref }}...HEAD > changes.diff

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Instalar Dependências
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: 📸 Executar App e Playwright
        run: |
          npx http-server public -p 8080 &
          npx wait-on http://localhost:8080 --timeout 30000
          npx playwright test tests/visual.spec.js

      - name: 💾 Salvar Artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visionguard-evidence
          path: screenshot-final.png
          retention-days: 5

      - name: 🧠 Executar Auditoria (Gemini)
        if: always()
        env:
          CI: 'true'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
        run: node ai_agents/visual_qa.js

name: VisionGuard Cognitive Harness

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened]

permissions:
  contents: write
  pull-requests: write

env:
  PAGES_BASE: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}

jobs:
  cognitive-qa:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔑 Verificar GEMINI_API_KEY
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "❌ GEMINI_API_KEY não está configurado."
            exit 1
          fi
          echo "✅ GEMINI_API_KEY presente."

      - name: 🔍 Extrair Git Diff
        run: git diff origin/${{ github.base_ref }}...HEAD > changes.diff

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: 📦 Instalar Dependências
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: 📸 Executar App e Playwright
        run: |
          npx http-server public -p 8080 &
          npx wait-on http://localhost:8080 --timeout 30000
          npx playwright test tests/visual.spec.js

      - name: 📤 Publicar screenshots em gh-pages/evidence/
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ORIG_DIR="$PWD"
          PR="${{ github.event.pull_request.number }}"
          SUBFOLDER="evidence/pr-${PR}/run-${{ github.run_number }}"

          git config --global user.name "visionguard-bot"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git ls-remote --exit-code --heads origin gh-pages > /dev/null 2>&1; then
            echo "ℹ️ gh-pages não existe ainda — imagens disponíveis após o primeiro deploy em main"
            exit 0
          fi

          WORK=$(mktemp -d)
          git clone --depth 1 --branch gh-pages \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$WORK"

          mkdir -p "$WORK/$SUBFOLDER"
          for f in screenshot-*.png; do
            [ -f "$f" ] && cp "$f" "$WORK/$SUBFOLDER/" || true
          done

          cd "$WORK"
          git add -A
          git diff --staged --quiet && { echo "ℹ️ Sem screenshots novos"; exit 0; }
          git commit -m "evidence: PR-${PR} run-${{ github.run_number }} @ $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin gh-pages
          cd "$ORIG_DIR"

          echo "SCREENSHOTS_BASE_URL=${{ env.PAGES_BASE }}/${SUBFOLDER}" >> "$GITHUB_ENV"

      - name: 🧠 Executar Auditoria (Gemini)
        if: always()
        env:
          CI: 'true'
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          SCREENSHOTS_BASE_URL: ${{ env.SCREENSHOTS_BASE_URL }}
        run: node ai_agents/visual_qa.js

      - name: 📊 Publicar badge e histórico
        if: always()
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          ORIG_DIR="$PWD"
          BRANCH="visionguard-evidence"
          PR="${{ github.event.pull_request.number }}"

          git config --global user.name "visionguard-bot"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          WORK=$(mktemp -d)
          if git ls-remote --exit-code --heads origin "$BRANCH" > /dev/null 2>&1; then
            git clone --depth 1 --branch "$BRANCH" \
              "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" "$WORK"
          else
            git init "$WORK"
            cd "$WORK"
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git checkout --orphan "$BRANCH"
            echo "# VisionGuard — Evidências de Auditoria" > README.md
            git add README.md
            git commit -m "chore: init evidence branch"
            cd "$ORIG_DIR"
          fi

          [ -f badge.json ] && cp badge.json "$WORK/"

          HISTORY="$WORK/audit-history.md"
          if [ ! -f "$HISTORY" ]; then
            printf '# Histórico de Auditorias VisionGuard\n\n| Data | Commit | PR | Veredito | Run |\n|---|---|---|---|---|\n' > "$HISTORY"
          fi
          DATE=$(date -u +"%Y-%m-%d %H:%M UTC")
          SHA="${{ github.sha }}"
          SHA_SHORT="${SHA:0:7}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          VEREDITO=$(grep -o '\[APROVADO\]\|\[REPROVADO\]' audit-output.md 2>/dev/null | head -1 || echo "N/A")
          printf '| %s | `%s` | [#%s](%s) | **%s** | [ver](%s) |\n' \
            "$DATE" "$SHA_SHORT" "$PR" "$PR_URL" "$VEREDITO" "$RUN_URL" >> "$HISTORY"

          cd "$WORK"
          git add -A
          git diff --staged --quiet || git commit -m "evidence: badge + histórico PR-${PR}"
          git push origin "$BRANCH" --force
          cd "$ORIG_DIR"

      - name: 💾 Salvar Artefatos
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visionguard-evidence-pr-${{ github.event.pull_request.number }}
          path: |
            screenshot-*.png
            audit-output.md
          retention-days: 14
